service: portfolito-backend

useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1
  memorySize: 256
  timeout: 15
  environment:
    MONGO_URI: ${env:MONGO_URI}
    FRONTEND_URL: ${env:FRONTEND_URL, 'http://localhost:3000'}
    BEDROCK_REGION: us-east-1
    JWT_SECRET: ${env:JWT_SECRET}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_SECRET: ${env:GOOGLE_CLIENT_SECRET}
    GOOGLE_CALLBACK_URL: ${env:GOOGLE_CALLBACK_URL}
    AVATAR_BUCKET: ${env:AVATAR_BUCKET}
    AWS_REGION: ${env:AWS_REGION, 'ap-south-1'}

  # Switch to REST API (v1) — required for throttling support in serverless.yml
  apiGateway:
    throttle:
      rateLimit: 50    # max 50 requests/second
      burstLimit: 20   # max burst of 20 concurrent requests

  # IAM permissions so your Lambda can call Bedrock
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:PutObjectAcl
          Resource:
            - arn:aws:s3:::${env:AVATAR_BUCKET}/avatars/*

functions:
  api:
    handler: index.handler
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: ANY
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 5000
    noPrependStageInUrl: true
